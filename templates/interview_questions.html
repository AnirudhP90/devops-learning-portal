{% extends "base.html" %}

{% block content %}

<h1>Interview Questions</h1>

<div class="row">

{% for question in questions %}

<div class="col-md-6 mb-3">

    <div class="card">

        <div class="card-body">

            <h5>{{ question.topic }}</h5>

            <p>{{ question.question }}</p>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
