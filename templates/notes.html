{% extends "base.html" %}

{% block content %}

<h1>Notes Repository</h1>

<div class="row">

{% for note in notes %}

<div class="col-md-4 mb-3">

    <div class="card">

        <div class="card-body">

            <h5>{{ note.title }}</h5>

            <p>
                <strong>Category:</strong>
                {{ note.category }}
            </p>

            <p>{{ note.description }}</p>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}

<script>

document.getElementById("searchBox")
.addEventListener("keyup", function() {

    let filter =
        this.value.toLowerCase();

    let cards =
        document.querySelectorAll(".card");

    cards.forEach(card => {

        if (
            card.innerText
            .toLowerCase()
            .includes(filter)
        ) {

            card.style.display = "";

        } else {

            card.style.display = "none";

        }

    });

});

</script>
